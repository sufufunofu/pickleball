<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pickleball Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --border: rgba(0,229,160,0.15);
    --card-glow: 0 0 30px rgba(0,229,160,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── PASSWORD SCREEN ── */
  #lock-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }

  .lock-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,160,0.4);
    line-height: 1;
  }
  .lock-logo span { color: var(--text); }

  .lock-subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    line-height: 1.6;
  }

  .lock-form {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .lock-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    width: 100%;
    text-align: center;
    letter-spacing: 0.3em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .lock-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
  }
  .lock-input::placeholder {
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .lock-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .lock-btn:active { transform: scale(0.97); }

  .lock-error {
    color: var(--accent2);
    font-size: 0.8rem;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .lock-error.show { opacity: 1; }

  /* ── MAIN APP ── */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    padding: 1.5rem 1rem 1rem;
    position: sticky;
    top: 0;
    background: rgba(10,15,30,0.9);
    backdrop-filter: blur(12px);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .header-meta {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  /* ── FILTER TABS ── */
  .filter-bar {
    padding: 0.8rem 1rem;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-tab {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.4rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .filter-tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── CONTENT ── */
  .content {
    max-width: 600px;
    margin: 0 auto;
    padding: 0.5rem 1rem 5rem;
  }

  /* ── MONTH GROUP ── */
  .month-group { margin-bottom: 2rem; }

  .month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    padding: 0.5rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .month-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    box-shadow: var(--card-glow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    animation: slideUp 0.4s ease both;
  }
  .match-card:active { transform: scale(0.98); }

  .match-card.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--card-glow);
  }
  .match-card.past { opacity: 0.55; }

  .card-header {
    display: flex;
    align-items: stretch;
  }

  .date-block {
    background: var(--surface2);
    padding: 1rem 0.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 64px;
    border-right: 1px solid var(--border);
    gap: 0.1rem;
  }

  .date-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--text);
  }
  .match-card.today .date-num { color: var(--accent); }

  .date-day {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .card-body {
    flex: 1;
    padding: 0.85rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.3rem;
  }

  .match-time {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .match-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .match-venue {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .match-venue::before {
    content: '📍';
    font-size: 0.65rem;
  }

  .card-badge {
    display: self-start;
    padding: 0.7rem 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .badge {
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .badge-upcoming { background: rgba(0,229,160,0.12); color: var(--accent); }
  .badge-today { background: var(--accent); color: var(--bg); }
  .badge-past { background: var(--surface2); color: var(--muted); }

  /* ── SETUP PANEL ── */
  #setup-panel {
    max-width: 600px;
    margin: 0 auto;
    padding: 1rem;
    display: none;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .setup-row {
    margin-bottom: 0.8rem;
  }

  .setup-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
    display: block;
  }

  .setup-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    outline: none;
  }
  .setup-input:focus { border-color: var(--accent); }

  .setup-help {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.25rem;
    line-height: 1.5;
  }

  .setup-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 0.5rem;
    width: 100%;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,15,30,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 10;
  }

  .nav-btn {
    flex: 1;
    padding: 0.9rem 0;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 1.1rem; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-text { font-size: 0.85rem; line-height: 1.7; }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .today-banner {
    background: linear-gradient(90deg, rgba(0,229,160,0.1), transparent);
    border-left: 3px solid var(--accent);
    padding: 0.5rem 0.8rem;
    border-radius: 0 8px 8px 0;
    font-size: 0.75rem;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div>
    <div class="lock-logo">PICKLE<span>SCHED</span></div>
  </div>
  <div class="lock-subtitle">試合スケジュールを確認するには<br>パスワードを入力してください</div>
  <div class="lock-form">
    <input class="lock-input" type="password" id="pw-input" placeholder="パスワード" autocomplete="off">
    <button class="lock-btn" onclick="checkPassword()">ENTER</button>
    <div class="lock-error" id="pw-error">パスワードが違います</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo">PICKLE<span>SCHED</span></div>
      <div class="header-meta" id="last-updated">読み込み中...</div>
    </div>
  </header>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming', this)">予定</button>
    <button class="filter-tab" data-filter="today" onclick="setFilter('today', this)">今日</button>
    <button class="filter-tab" data-filter="past" onclick="setFilter('past', this)">過去</button>
  </div>

  <div id="schedule-view">
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
    </div>
  </div>

  <div id="setup-panel">
    <div class="setup-card">
      <div class="setup-title">⚙ 設定</div>

      <div class="setup-row">
        <label class="setup-label">Google Sheets スプレッドシートID</label>
        <input class="setup-input" id="sheet-id" placeholder="例: 1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms">
        <div class="setup-help">
          スプレッドシートのURLから取得：<br>
          https://docs.google.com/spreadsheets/d/<b>★ここ★</b>/edit
        </div>
      </div>

      <div class="setup-row">
        <label class="setup-label">シート名</label>
        <input class="setup-input" id="sheet-name" placeholder="例: スケジュール" value="シート1">
      </div>

      <div class="setup-row">
        <label class="setup-label">Google API Key</label>
        <input class="setup-input" id="api-key" type="password" placeholder="AIza...">
        <div class="setup-help">
          Google Cloud Console → APIとサービス → 認証情報 で作成<br>
          Sheets API を有効にしてください
        </div>
      </div>

      <div class="setup-row">
        <label class="setup-label">パスワード変更</label>
        <input class="setup-input" id="new-password" type="password" placeholder="新しいパスワード">
      </div>

      <button class="setup-btn" onclick="saveSettings()">保存して更新</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-schedule" onclick="showView('schedule')">
      <span class="nav-icon">📅</span>スケジュール
    </button>
    <button class="nav-btn" id="nav-setup" onclick="showView('setup')">
      <span class="nav-icon">⚙️</span>設定
    </button>
  </nav>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG — ここを変更して使う
// ══════════════════════════════════════════
const DEFAULT_PASSWORD = 'pickleball';

// スプレッドシートの列マッピング（A列=0, B列=1...）
const COL = {
  date:  0,   // 日付
  time:  1,   // 時間
  title: 2,   // 試合名・イベント名
  venue: 3,   // 会場
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let allMatches = [];
let currentFilter = 'all';
let settings = {};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init() {
  settings = JSON.parse(localStorage.getItem('pickle_settings') || '{}');
  settings.password = settings.password || DEFAULT_PASSWORD;
  // デフォルトのスプレッドシートID（設定で上書き可能）
  if (!settings.sheetId) settings.sheetId = '1w0BY8MxjD6k_yCAq00KQb2C8JQbY-jwkpafM7mFgdPg';
  if (!settings.sheetName) settings.sheetName = 'シート1';

  // パスワード済みセッション
  if (sessionStorage.getItem('pickle_auth') === '1') {
    unlock();
  }

  // Enterキー
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
}

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === settings.password) {
    sessionStorage.setItem('pickle_auth', '1');
    unlock();
  } else {
    const err = document.getElementById('pw-error');
    err.classList.add('show');
    document.getElementById('pw-input').value = '';
    setTimeout(() => err.classList.remove('show'), 2500);
  }
}

function unlock() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadSchedule();
  // 設定を入力欄に反映
  if (settings.sheetId) document.getElementById('sheet-id').value = settings.sheetId;
  if (settings.sheetName) document.getElementById('sheet-name').value = settings.sheetName;
  if (settings.apiKey) document.getElementById('api-key').value = settings.apiKey;
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function showView(view) {
  document.getElementById('schedule-view').style.display = view === 'schedule' ? 'block' : 'none';
  document.getElementById('setup-panel').style.display = view === 'setup' ? 'block' : 'none';
  document.getElementById('nav-schedule').classList.toggle('active', view === 'schedule');
  document.getElementById('nav-setup').classList.toggle('active', view === 'setup');
}

// ══════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════
function saveSettings() {
  settings.sheetId = document.getElementById('sheet-id').value.trim();
  settings.sheetName = document.getElementById('sheet-name').value.trim() || 'シート1';
  settings.apiKey = document.getElementById('api-key').value.trim();
  const newPw = document.getElementById('new-password').value;
  if (newPw) settings.password = newPw;
  localStorage.setItem('pickle_settings', JSON.stringify(settings));
  showView('schedule');
  loadSchedule();
}

// ══════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMlXEcE465K7WvOw7XISGRC6t3Gi1JRg9rU_axpsBxwpleIofc8jX7h37NfX3sZ5dh/exec';

async function loadSchedule() {
  showLoading();
  try {
    const res = await fetch(GAS_URL);
    if (!res.ok) throw new Error(`Error: ${res.status}`);
    const data = await res.json();
    allMatches = parseGASData(data);
    updateLastUpdated();
    renderMatches();
  } catch (e) {
    showError(e.message);
  }
}

function parseGASData(rows) {
  return rows
    .filter(r => r.title)
    .map((r, i) => ({
      id: i,
      dateFrom: parseDate(String(r.dateFrom || '')),
      dateTo:   parseDate(String(r.dateTo   || '')),
      title: r.title || '大会',
      venue: r.venue || '',
      url:   r.url   || '',
    }))
    .filter(m => m.dateFrom)
    .sort((a, b) => a.dateFrom - b.dateFrom);
}

function parseDate(str) {
  if (!str) return null;
  // Date object (from Google Sheets)
  if (str instanceof Date) return isNaN(str) ? null : str;
  str = String(str).trim();
  if (!str) return null;
  // ISO形式 "2026-03-21T15:00:00.000Z"
  let d = new Date(str);
  if (!isNaN(d)) return d;
  // "2026/03/20(金)" や "2026/3/20" など
  const m = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  const m2 = str.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if (m2) {
    const now = new Date();
    return new Date(now.getFullYear(), parseInt(m2[1])-1, parseInt(m2[2]));
  }
  return null;
}

// ── SAMPLE DATA (設定前に表示) ──
function renderSample() {
  const today = new Date();
  const sample = [
    { id:0, date: addDays(today,-7), time:'10:00', title:'リーグ戦 第3回', venue:'代々木公園スポーツセンター' },
    { id:1, date: addDays(today,-1), time:'14:00', title:'練習試合 vs Azureチーム', venue:'品川コート B面' },
    { id:2, date: new Date(today), time:'18:30', title:'親善試合 vs Sunriseチーム', venue:'目黒区体育館' },
    { id:3, date: addDays(today,3), time:'10:00', title:'リーグ戦 第4回', venue:'渋谷スポーツクラブ' },
    { id:4, date: addDays(today,10), time:'09:00', title:'大会 東京オープン', venue:'国立代々木競技場 サブ' },
    { id:5, date: addDays(today,17), time:'13:00', title:'練習試合 vs Tokyoチーム', venue:'品川コート A面' },
    { id:6, date: addDays(today,30), time:'10:00', title:'リーグ戦 第5回', venue:'渋谷スポーツクラブ' },
  ];
  allMatches = sample;
  document.getElementById('last-updated').innerHTML = 'サンプルデータ表示中<br>設定からAPIを登録';
  renderMatches();
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
const DAYS_JA = ['日','月','火','水','木','金','土'];

function formatDateRange(from, to) {
  const f = new Date(from); const t = new Date(to);
  const fd = `${f.getMonth()+1}/${f.getDate()}(${DAYS_JA[f.getDay()]})`;
  const td = `${t.getMonth()+1}/${t.getDate()}(${DAYS_JA[t.getDay()]})`;
  return f.getTime() === t.getTime() ? fd : `${fd} 〜 ${td}`;
}

function renderMatches() {
  const today = new Date(); today.setHours(0,0,0,0);
  const filtered = allMatches.filter(m => {
    const from = new Date(m.dateFrom); from.setHours(0,0,0,0);
    const to   = new Date(m.dateTo || m.dateFrom); to.setHours(0,0,0,0);
    if (currentFilter === 'today')    return from <= today && today <= to;
    if (currentFilter === 'upcoming') return to >= today;
    if (currentFilter === 'past')     return to < today;
    return true;
  });

  const content = document.getElementById('content');

  if (!filtered.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🏓</div><div class="empty-text">該当する大会がありません</div></div>`;
    return;
  }

  // 今日のバナー
  const hasToday = filtered.some(m => {
    const from = new Date(m.dateFrom); from.setHours(0,0,0,0);
    const to   = new Date(m.dateTo || m.dateFrom); to.setHours(0,0,0,0);
    return from <= today && today <= to;
  });

  // 月別グループ（開始日基準）
  const groups = {};
  filtered.forEach(m => {
    const d = new Date(m.dateFrom);
    const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  let html = '';
  if (hasToday && currentFilter === 'all') {
    html += `<div class="today-banner">⚡ 今日開催中の大会があります</div>`;
  }

  Object.entries(groups).forEach(([month, matches]) => {
    html += `<div class="month-group"><div class="month-label">${month}</div>`;
    matches.forEach((m, idx) => {
      const from = new Date(m.dateFrom); from.setHours(0,0,0,0);
      const to   = new Date(m.dateTo || m.dateFrom); to.setHours(0,0,0,0);
      const isToday = from <= today && today <= to;
      const isPast  = to < today;
      const badge = isToday
        ? `<span class="badge badge-today">開催中</span>`
        : isPast
          ? `<span class="badge badge-past">終了</span>`
          : `<span class="badge badge-upcoming">予定</span>`;
      const cls = isToday ? 'match-card today' : isPast ? 'match-card past' : 'match-card';
      const delay = idx * 0.05;
      const dateStr = formatDateRange(m.dateFrom, m.dateTo || m.dateFrom);
      const urlBtn = m.url ? `<a href="${m.url}" target="_blank" style="display:inline-block;margin-top:0.4rem;font-size:0.72rem;color:var(--accent);text-decoration:none;">🔗 大会サイト</a>` : '';
      html += `
        <div class="${cls}" style="animation-delay:${delay}s">
          <div class="card-header">
            <div class="date-block">
              <div class="date-num" style="font-size:1.3rem;line-height:1.2">${new Date(m.dateFrom).getMonth()+1}/${new Date(m.dateFrom).getDate()}</div>
              <div class="date-day">${DAYS_JA[new Date(m.dateFrom).getDay()]}</div>
            </div>
            <div class="card-body">
              <div class="match-time">📅 ${dateStr}</div>
              <div class="match-title">${m.title}</div>
              ${m.venue ? `<div class="match-venue">${m.venue}</div>` : ''}
              ${urlBtn}
            </div>
            <div class="card-badge">${badge}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  content.innerHTML = html;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

function showLoading() {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>`;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-text">データの読み込みに失敗しました<br><small style="color:#ff6b35">${msg}</small><br><br>設定タブでAPIキーとシートIDを確認してください</div>
    </div>`;
}

function updateLastUpdated() {
  const now = new Date();
  document.getElementById('last-updated').innerHTML =
    `更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}<br>${allMatches.length}件`;
}

init();
</script>
</body>
</html>
